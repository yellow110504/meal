<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <meta name="theme-color" content="#252525">

    <meta
        property="og:description"
        content="구로중학교에 대한 다양한 정보들을 만나 보세요"
    >
    <meta property="og:image" content="icon.ico">

    <link
        rel="shortcut icon"
        type="image/x-icon"
        href="icon.ico"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="mealmonth.css?23">

    <script src="mealmonth.js?20" defer></script>

    <title>월간 급식</title>
</head>

<body>

<div class="background">

    <header class="meal-appbar">

        <div class="meal-appbar-inner">

            <h1>급식</h1>

            <!-- 하루 급식 페이지 주소 -->
            <a href="./" id="mov">
                하루
            </a>

        </div>

    </header>

    <main id="body">

        <section
            id="da"
            class="month-navigation"
            aria-label="급식 월 변경"
        >

<button
    type="button"
    id="date1"
    onclick="setminus()"
    aria-label="이전 날짜"
>
    <span class="date-arrow date-arrow-left"></span>
</button>

            <div class="meal-current-date">

                <span>급식 월</span>

                <div
                    id="dat"
                    aria-live="polite"
                >
                    날짜를 불러오는 중입니다.
                </div>

            </div>

<button
    type="button"
    id="date2"
    onclick="setdate()"
    aria-label="다음 날짜"
>
    <span class="date-arrow date-arrow-right"></span>
</button>

        </section>

        <section
            class="calendar-panel"
            aria-label="월간 급식 달력"
        >

            <div class="calendar-weekdays" aria-hidden="true">
                <div>월</div>
                <div>화</div>
                <div>수</div>
                <div>목</div>
                <div>금</div>
            </div>

            <div
                id="calendarRows"
                role="grid"
                aria-busy="true"
            ></div>

        </section>

    </main>

</div>

<script src="cookie.js"></script>

</body>
</html>
